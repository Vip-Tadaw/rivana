<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#070a12">
    <meta name="background-color" content="#070a12">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rivana Pro - الدردشة العامة الحية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #070a12;
            --bg-panel: #0d1322;
            --bg-field: #090d16;
            --cyber-purple: #7c3aed;
            --cyber-blue: #2563eb;
            --neon-cyan: #06b6d4;
            --neon-green: #10b981;
            --neon-pink: #ec4899;
            --text-white: #f3f4f6;
            --text-dim: #6b7280;
            --molded-inner: inset 0 4px 8px rgba(0,0,0,0.8), inset 0 -1px 1px rgba(255,255,255,0.05);
            --molded-out: 0 10px 25px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.1);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background-color: var(--bg-deep); 
            color: var(--text-white); 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            padding-bottom: 90px;
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 16px 12px;
            gap: 14px;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 5px;
        }

        .back-btn {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .active-members-panel {
            background: var(--bg-panel);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 12px;
            box-shadow: var(--molded-out);
        }

        .panel-title {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .members-slider {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .members-slider::-webkit-scrollbar { height: 3px; }
        .members-slider::-webkit-scrollbar-thumb { background: rgba(124, 58, 237, 0.3); border-radius: 10px; }

        .member-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-width: 65px;
            position: relative;
        }

        .avatar-wrapper {
            position: relative;
            width: 48px;
            height: 48px;
            margin-bottom: 5px;
        }

        .member-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .online-dot {
            position: absolute;
            bottom: 2px;
            left: 2px;
            width: 10px;
            height: 10px;
            background-color: var(--neon-green);
            border: 2px solid var(--bg-panel);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-green);
        }

        .member-name {
            font-size: 11px;
            font-weight: 600;
            max-width: 65px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .member-id {
            font-size: 8px;
            color: var(--text-dim);
            font-family: monospace;
        }

        .chat-messages-area {
            flex: 1;
            background: #090f1e;
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 24px;
            padding: 16px;
            box-shadow: var(--molded-inner);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: calc(100vh - 300px);
        }

        .chat-messages-area::-webkit-scrollbar { width: 5px; }
        .chat-messages-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 10px; }

        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 85%;
            align-items: flex-start;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-incoming { align-self: flex-start; }
        .msg-outgoing { align-self: flex-end; flex-direction: row-reverse; }

        .msg-sender-img {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .msg-content-block { display: flex; flex-direction: column; gap: 3px; }
        .msg-username { font-size: 11px; font-weight: bold; color: var(--text-dim); }
        .msg-outgoing .msg-username { text-align: left; color: var(--neon-cyan); }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 13px;
            line-height: 1.5;
            word-break: break-word;
            position: relative;
        }

        .msg-incoming .msg-bubble {
            background: var(--bg-panel);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-white);
            border-top-right-radius: 4px;
        }

        .msg-outgoing .msg-bubble {
            background: linear-gradient(135deg, var(--cyber-purple), #5b21b6);
            color: white;
            border-top-left-radius: 4px;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2);
        }

        .msg-time { font-size: 9px; color: rgba(255,255,255,0.4); align-self: flex-end; margin-top: 2px; font-family: monospace; }

        /* منطقة مؤشر جاري الكتابة */
        .typing-indicator-container {
            min-height: 20px;
            padding: 0 15px;
            display: flex;
            align-items: center;
        }

        .typing-text {
            font-size: 11px;
            color: var(--neon-cyan);
            font-style: italic;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .typing-text.visible {
            opacity: 1;
        }

        .chat-input-container {
            background: var(--bg-panel);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--molded-out);
        }

        .input-action-icon { color: var(--text-dim); font-size: 18px; cursor: pointer; transition: color 0.2s; }
        .input-action-icon:hover { color: white; }
        .chat-input-field { flex: 1; background: transparent; border: none; outline: none; color: white; font-size: 14px; padding: 6px 0; }
        .chat-input-field::placeholder { color: var(--text-dim); }

        .send-btn {
            width: 40px;
            height: 40px;
            background: var(--cyber-purple);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(124, 58, 237, 0.4);
        }
        .send-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        .toast-notification {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-panel);
            border-bottom: 4px solid var(--neon-pink);
            border-radius: 16px;
            padding: 12px 24px;
            box-shadow: var(--molded-out);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 5000;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-notification.active { bottom: 100px; }
    </style>
</head>
<body>

<div class="chat-container">
    
    <div class="chat-header">
        <a href="javascript:history.back()" class="back-btn"><i class="fa-solid fa-arrow-right"></i></a>
        <div>
            <h1 style="font-size: 20px; font-weight: 900; margin: 0; display:flex; align-items:center; gap:8px;">
                <span>الدردشة العامة</span>
                <span style="font-size:11px; background: rgba(124, 58, 237, 0.15); color: var(--cyber-purple); padding: 2px 8px; border-radius: 8px; border: 1px solid rgba(124, 58, 237, 0.3)">غرفة حية</span>
            </h1>
            <p style="color: var(--text-dim); font-size: 12px; margin-top: 2px;">تواصل مباشر وآمن مع مجتمع ريفانا برو</p>
        </div>
    </div>

    <div class="active-members-panel">
        <div class="panel-title">
            <i class="fa-solid fa-circle-nodes" style="color: var(--neon-green)"></i>
            <span>الأعضاء المتصلون الآن</span>
        </div>
        <div class="members-slider" id="active-members-list">
            <div style="font-size:11px; color:var(--text-dim); padding: 5px;">جاري تحديث الرادار المباشر...</div>
        </div>
    </div>

    <div class="chat-messages-area" id="chat-messages-container"></div>

    <div class="typing-indicator-container">
        <span class="typing-text" id="typing-indicator-text"></span>
    </div>

    <div class="chat-input-container">
        <i class="fa-solid fa-paperclip input-action-icon"></i>
        <input type="text" class="chat-input-field" id="message-text-input" placeholder="اكتب رسالتك هنا بكل وضوح..." autocomplete="off">
        <i class="fa-regular fa-face-smile input-action-icon"></i>
        <button class="send-btn" id="btn-send-message"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

</div>

<div class="toast-notification" id="chat-global-toast">
    <i class="fa-solid fa-triangle-exclamation" style="color: var(--neon-pink); font-size: 18px;"></i>
    <div id="toast-msg-content" style="font-size: 13px; font-weight: bold;"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, doc, addDoc, setDoc, updateDoc, deleteDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWOr0McRsxLMHehiBA_EIpabnz5CBxp04",
        authDomain: "reivana-8e377.firebaseapp.com",
        databaseURL: "https://reivana-8e377-default-rtdb.firebaseio.com",
        projectId: "reivana-8e377",
        storageBucket: "reivana-8e377.firebasestorage.app",
        messagingSenderId: "1066129522960",
        appId: "1:1066129522960:web:8179e50a906fd08ee96595",
        measurementId: "G-TD9YWWDEDT"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserId = null;
    let currentUserProfile = { name: "مستثمر ريفانا", avatar: "https://placedog.net/100/100" };
    let typingTimeout = null;

    const badWordsDictionary = [
        "كلب", "حمار", "تفو", "كواد", "منيوك", "كس", "عير", "طيز", "قحبة", "شرموط", 
        "ساقط", "ابن الحرام", "سافل", "خنيث", "نعال", "قندرة", "مطى", "مطي"
    ];

    function applyTextSafetyFilter(rawText) {
        let cleanText = rawText;
        badWordsDictionary.forEach(word => {
            const regex = new RegExp(word, "gi");
            if (cleanText.match(regex)) cleanText = cleanText.replace(regex, "***");
        });
        return cleanText;
    }

       onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserId = user.uid;
            
            // سحب بيانات المستخدم الحقيقية
            onSnapshot(doc(db, "users", currentUserId), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // يجلب الاسم، وإذا لم يجده يضع اسم افتراضي
                    currentUserProfile.name = data.name || data.username || "عضو ريفانا";
                    
                    // هنا الذكاء: يبحث عن الصورة في كل المسميات المحتملة بـ Firestore، وإذا لم يجدها يضع صورة مستخدم طبيعية بدلاً من الروبوت
                    currentUserProfile.avatar = data.avatarUrl || data.avatar || data.image || user.photoURL || `https://cdn-icons-png.flaticon.com/512/149/149071.png`;
                    
                    joinActiveChatRoom();
                } else {
                    // إذا كان الحساب جديداً تماماً ولا يمتلك وثيقة في مجموعة users
                    currentUserProfile.name = user.displayName || "عضو جديد";
                    currentUserProfile.avatar = user.photoURL || `https://cdn-icons-png.flaticon.com/512/149/149071.png`;
                    joinActiveChatRoom();
                }
                initChatRealtimeEngines();
            });
        } else {
            window.location.href = 'login.html';
        }
    });


    async function joinActiveChatRoom() {
        if(!currentUserId) return;
        const presenceRef = doc(db, "active_chat_users", currentUserId);
        await setDoc(presenceRef, {
            uid: currentUserId,
            name: currentUserProfile.name,
            avatar: currentUserProfile.avatar,
            isTyping: false,
            joinedAt: serverTimestamp()
        });
    }

    window.addEventListener("beforeunload", () => {
        if(currentUserId) {
            const presenceRef = doc(db, "active_chat_users", currentUserId);
            deleteDoc(presenceRef);
        }
    });

    function initChatRealtimeEngines() {
        listenToActiveUsers();
        listenToGlobalMessages();
        
        const inputField = document.getElementById('message-text-input');
        
        document.getElementById('btn-send-message').onclick = handleMessageSubmission;
        inputField.onkeypress = (e) => { if(e.key === 'Enter') handleMessageSubmission(); };
        
        // استشعار الكتابة لإرسال الإشارة للسيرفر
        inputField.addEventListener('input', () => {
            if(!currentUserId) return;
            const presenceRef = doc(db, "active_chat_users", currentUserId);
            updateDoc(presenceRef, { isTyping: true });

            if(typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                updateDoc(presenceRef, { isTyping: false });
            }, 1500);
        });
    }

    function listenToActiveUsers() {
        const activeUsersQuery = query(collection(db, "active_chat_users"), orderBy("joinedAt", "desc"));
        
        onSnapshot(activeUsersQuery, (snapshot) => {
            const membersSlider = document.getElementById('active-members-list');
            const typingText = document.getElementById('typing-indicator-text');
            
            membersSlider.innerHTML = '';
            let typingUsers = [];

            snapshot.forEach((doc) => {
                const user = doc.data();
                const userIdShort = user.uid.substring(0, 5).toUpperCase(); 
                
                const memberHTML = `
                    <div class="member-node">
                        <div class="avatar-wrapper">
                            <img src="${user.avatar}" class="member-avatar" alt="profile">
                            <div class="online-dot"></div>
                        </div>
                        <span class="member-name">${user.name}</span>
                        <span class="member-id">ID:${userIdShort}</span>
                    </div>
                `;
                membersSlider.innerHTML += memberHTML;

                // تجميع أسماء الأشخاص الذين يكتبون الآن (باستثناء نفسي)
                if(user.isTyping && user.uid !== currentUserId) {
                    typingUsers.push(user.name);
                }
            });

            if(snapshot.empty) {
                membersSlider.innerHTML = '<div style="font-size:11px; color:var(--text-dim)">لا يوجد أعضاء آخرين نشطين حالياً.</div>';
            }

            // تحديث مؤشر جاري الكتابة
            if(typingUsers.length > 0) {
                if(typingUsers.length === 1) {
                    typingText.innerText = `${typingUsers[0]} يكتب الآن...`;
                } else {
                    typingText.innerText = `عدة أشخاص يكتبون الآن...`;
                }
                typingText.classList.add('visible');
            } else {
                typingText.classList.remove('visible');
                typingText.innerText = '';
            }
        });
    }

    function listenToGlobalMessages() {
        const msgQuery = query(collection(db, "public_messages"), orderBy("timestamp", "asc"), limit(60));
        const container = document.getElementById('chat-messages-container');

        onSnapshot(msgQuery, (snapshot) => {
            container.innerHTML = '';
            snapshot.forEach((doc) => {
                const msg = doc.data();
                const isMe = msg.senderId === currentUserId;
                const filteredText = applyTextSafetyFilter(msg.text || "");
                
                let timeString = "الآن";
                if(msg.timestamp) {
                    const date = msg.timestamp.toDate();
                    timeString = date.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
                }

                const msgRowHTML = `
                    <div class="msg-row ${isMe ? 'msg-outgoing' : 'msg-incoming'}">
                        <img src="${msg.senderAvatar}" class="msg-sender-img" alt="avatar">
                        <div class="msg-content-block">
                            <span class="msg-username">${isMe ? 'أنت' : msg.senderName}</span>
                            <div class="msg-bubble">${filteredText}</div>
                            <span class="msg-time">${timeString}</span>
                        </div>
                    </div>
                `;
                container.innerHTML += msgRowHTML;
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    async function handleMessageSubmission() {
        const input = document.getElementById('message-text-input');
        const text = input.value.trim();

        if(!text) return; 

        const safeText = applyTextSafetyFilter(text);
        input.value = ''; 

        // إيقاف إشارة جاري الكتابة فور الإرسال
        if(typingTimeout) clearTimeout(typingTimeout);
        if(currentUserId) {
            updateDoc(doc(db, "active_chat_users", currentUserId), { isTyping: false });
        }

        try {
            await addDoc(collection(db, "public_messages"), {
                senderId: currentUserId,
                senderName: currentUserProfile.name,
                senderAvatar: currentUserProfile.avatar,
                text: safeText,
                timestamp: serverTimestamp()
            });
        } catch (error) {
            triggerChatToast("❌ فشل إرسال الرسالة، تحقق من جودة الشبكة.");
            console.error("Chat Error: ", error);
        }
    }

    function triggerChatToast(msg) {
        const toast = document.getElementById('chat-global-toast');
        document.getElementById('toast-msg-content').innerText = msg;
        toast.classList.add('active');
        setTimeout(() => toast.classList.remove('active'), 3500);
    }
</script>

</body>
</html>
