<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rivana | بوابة الإيداع الحية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0B0E17;
            --bg-card: #151828;
            --bg-card-hover: #1E233B;
            --primary: #7c3aed;
            --primary-dark: #6d28d9;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --purple-gradient: linear-gradient(270deg, #4f46e5, #7c3aed, #9333ea, #4f46e5);
            --success: #00b894;
            --danger: #ff7675;
            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background-color: #05060A; color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .app-container { 
            width: 100%; max-width: 480px; min-height: 100vh; background-color: var(--bg-main); 
            position: relative; overflow-y: auto; overflow-x: hidden; padding-bottom: 40px; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5); animation: fadeIn 0.4s ease-out; 
        }
        .app-container::-webkit-scrollbar { display: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes flowGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes borderGlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        header { display: flex; flex-direction: column; padding: 20px; position: sticky; top: 0; background: rgba(11, 14, 23, 0.9); backdrop-filter: blur(15px); z-index: 100; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .back-btn, .help-btn { background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; transition: var(--transition-smooth); }
        .back-btn:hover, .help-btn:hover { background: rgba(255,255,255,0.08); }
        .back-btn:active, .help-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.15); }
        .page-title { font-size: 18px; font-weight: 800; }

        .section-container { padding: 0 20px; margin-top: 20px; animation: slideUp 0.5s ease-out backwards; }
        .balance-hero { background: var(--purple-gradient); background-size: 300% 300%; animation: flowGradient 10s ease infinite; border-radius: 24px; padding: 24px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 15px 35px rgba(79, 70, 229, 0.35); }
        .balance-label-wrapper { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .balance-label { font-size: 12px; color: rgba(255,255,255,0.85); font-weight: 500; }
        .toggle-balance-btn { background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; transition: var(--transition-smooth); }
        .toggle-balance-btn:active { transform: scale(0.75); }
        .percent-badge { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; margin-right: auto; }
        .balance-value { font-size: 24px; font-weight: 800; display: flex; align-items: baseline; gap: 6px; }
        .hero-icon { width: 64px; height: 64px; background: rgba(255,255,255,0.1); border-radius: 20px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }

        .sub-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; margin-top: 24px; color: white; }
        
        /* كروت اختيار العملة الاحترافية وتفاعلاتها */
        .currency-selector { display: flex; gap: 14px; width: 100%; }
        .currency-card { 
            flex: 1; background: var(--bg-card); border: 1px solid var(--border-color); 
            border-radius: 18px; padding: 16px; display: flex; flex-direction: column; 
            align-items: center; gap: 8px; cursor: pointer; 
            transition: var(--transition-smooth); 
        }
        .currency-card:hover { transform: translateY(-3px); background: var(--bg-card-hover); border-color: rgba(255, 255, 255, 0.2); box-shadow: 0 6px 15px rgba(0, 0, 0, 0.25); }
        .currency-card:active { transform: scale(0.94) translateY(0px); }
        .currency-card.active { border-color: var(--primary); background: rgba(124, 58, 237, 0.08); box-shadow: 0 8px 20px rgba(124, 58, 237, 0.25); transform: translateY(-2px); }
        
        .curr-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; transition: var(--transition-smooth); }
        .currency-card:hover .curr-icon { transform: scale(1.1); }
        .usdt { background: rgba(38, 161, 123, 0.15); color: #26a17b; font-size: 18px; }
        .iqd { background: rgba(124, 58, 237, 0.15); color: #a78bfa; font-size: 13px; }
        .curr-name { font-size: 14px; font-weight: 700; }
        .curr-sub { font-size: 11px; color: var(--text-muted); }

        /* طرق الدفع وتأثير البريق الحركي المتكامل */
        .methods-container { display: flex; flex-direction: column; gap: 12px; }
        .method-item { 
            display: flex; align-items: center; justify-content: space-between; 
            background: var(--bg-card); border: 1px solid var(--border-color); 
            border-radius: 18px; padding: 18px; cursor: pointer; position: relative; 
            transition: var(--transition-smooth);
        }
        .method-item:hover { transform: translateY(-2px); background: var(--bg-card-hover); border-color: rgba(255, 255, 255, 0.15); }
        .method-item:active { transform: scale(0.96) translateY(0px); }
        .method-item.selected { 
            border-color: transparent; background: rgba(124, 58, 237, 0.08); 
            box-shadow: inset 0 0 12px rgba(124, 58, 237, 0.15); transform: translateY(-1px);
        }
        .method-item.selected::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 18px; padding: 1px;
            background: linear-gradient(90deg, #00c6ff, #0072ff, #0d9488, #00c6ff);
            background-size: 300% 300%; animation: borderGlow 3s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
        }

        .method-left { display: flex; align-items: center; gap: 14px; }
        .method-icon { width: 44px; height: 44px; border-radius: 14px; background: var(--glass-bg); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; transition: var(--transition-smooth); }
        .method-item:hover .method-icon { transform: rotate(5deg) scale(1.05); }
        
        .bg-binance { background: rgba(243, 186, 11, 0.15); color: #F3BA0B; }
        .bg-okx { background: rgba(255, 255, 255, 0.1); color: #FFFFFF; }
        .bg-card-pay { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .bg-wallet { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        
        .method-info { display: flex; flex-direction: column; gap: 4px; }
        .method-title { font-size: 14px; font-weight: 700; }
        .method-desc { font-size: 11px; color: var(--text-muted); }
        .method-right { display: flex; align-items: center; gap: 12px; }
        .fee-badge { background: rgba(124, 58, 237, 0.15); color: #a78bfa; font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 6px; }

        /* صندوق العناوين التفاعلي الفخم مع البريق الملون للحدود */
        .payment-details-box {
            background: rgba(0, 0, 0, 0.2); position: relative; border-radius: 18px; padding: 20px; margin-top: 14px;
            display: none; flex-direction: column; align-items: center; gap: 16px; animation: fadeIn 0.4s ease-out; z-index: 1;
        }
        .payment-details-box::before {
            content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
            background: linear-gradient(90deg, #0d9488, #0284c7, #0369a1, #0d9488); background-size: 300% 300%;
            animation: borderGlow 4s linear infinite; border-radius: 19px; z-index: -1; opacity: 0.7;
        }
        .payment-details-box::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #0B0E17; border-radius: 18px; z-index: -1; }
        
        .network-badge { padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; color: white; }
        .qr-code-container { width: 150px; height: 150px; background: white; border-radius: 12px; padding: 10px; display: flex; justify-content: center; align-items: center; transition: var(--transition-smooth); }
        .qr-code-container:hover { transform: scale(1.04); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .qr-code-container img { width: 100%; height: 100%; object-fit: contain; }
        .copy-field-group { width: 100%; display: flex; flex-direction: column; gap: 6px; }
        .field-label { font-size: 11px; color: var(--text-muted); font-weight: 600; }
        
        .copy-box { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); border: 1px solid var(--border-color); padding: 12px 16px; border-radius: 12px; transition: var(--transition-smooth); }
        .copy-box:hover { border-color: rgba(255, 255, 255, 0.15); }
        .copy-text { font-size: 13px; font-weight: 700; color: white; word-break: break-all; }
        
        .copy-btn { background: rgba(124, 58, 237, 0.15); color: #a78bfa; border: none; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; transition: var(--transition-smooth); }
        .copy-btn:hover { background: var(--primary); color: white; }
        .copy-btn:active { transform: scale(0.88); }

        /* منطقة رفع المرفقات والوصل الحركي */
        .screenshot-upload-group { width: 100%; display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
        .upload-dropzone {
            width: 100%; background: rgba(124, 58, 237, 0.02); border: 2px dashed rgba(124, 58, 237, 0.3);
            border-radius: 14px; padding: 18px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 8px; cursor: pointer; transition: var(--transition-smooth);
            position: relative; overflow: hidden; min-height: 90px;
        }
        .upload-dropzone:hover { background: rgba(124, 58, 237, 0.08); border-color: var(--primary); transform: translateY(-2px); }
        .upload-dropzone:active { transform: scale(0.96) translateY(0px); }
        .upload-icon { color: #a78bfa; transition: var(--transition-smooth); }
        .upload-dropzone:hover .upload-icon { transform: translateY(-3px) scale(1.1); }
        .upload-text { font-size: 12px; font-weight: 700; color: white; }
        .upload-subtext { font-size: 10px; color: var(--text-muted); }
        .preview-img { width: 100%; height: 100%; max-height: 140px; object-fit: contain; border-radius: 8px; display: none; transition: var(--transition-smooth); }

        .amount-input-wrapper { position: relative; width: 100%; margin-bottom: 14px; }
        .amount-input { 
            width: 100%; background: var(--bg-card); border: 1px solid var(--border-color); 
            border-radius: 18px; padding: 20px; font-size: 20px; font-weight: 700; color: white; 
            outline: none; font-family: inherit; transition: var(--transition-smooth);
        }
        .amount-input:focus { border-color: var(--primary); box-shadow: inset 0 2px 8px rgba(0,0,0,0.4), 0 0 0 4px rgba(124, 58, 237, 0.15); transform: scale(0.99); }
        .currency-tag { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; background: rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 10px; pointer-events: none; }
        .curr-logo-img { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; }
        
        /* الأزرار السريعة للمبالغ والتأثير الحركي */
        .quick-amounts { display: flex; gap: 8px; margin-bottom: 24px; }
        .quick-btn { 
            flex: 1; background: var(--bg-card); border: 1px solid var(--border-color); 
            color: var(--text-muted); font-family: inherit; font-size: 13px; font-weight: 600; 
            padding: 12px 0; border-radius: 12px; cursor: pointer; transition: var(--transition-smooth);
        }
        .quick-btn:hover { background: var(--bg-card-hover); color: white; border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
        .quick-btn:active { transform: scale(0.92); }
        .quick-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3); transform: translateY(-1px); }

        .info-box { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 18px; padding: 18px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        .info-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .info-label { color: var(--text-muted); }
        .info-value { font-weight: 700; color: white; }
        .info-divider { height: 1px; background: var(--border-color); margin: 4px 0; }
        .total-row .info-value { color: #a78bfa; font-size: 16px; }

        /* زر التأكيد الحركي العملاق */
        .submit-btn { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 18px; border-radius: 18px; font-size: 16px; font-weight: 700; 
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; 
            transition: var(--transition-smooth); box-shadow: 0 4px 15px rgba(124, 58, 237, 0.35);
        }
        .submit-btn:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5); }
        .submit-btn:active { transform: scale(0.96) translateY(0px); }
        .spin { animation: spin 1s linear infinite; }

        /* مصنع الإشعار الداخلي للتطبيق الفاخر بنمط نيون مدمج */
        .app-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: #161B2C; border: 1px solid rgba(255,255,255,0.1);
            padding: 16px; border-radius: 16px; display: flex; align-items: center; gap: 12px;
            z-index: 9999; box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 15px rgba(124, 58, 237, 0.05); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .app-toast.show { top: 24px; }
        .toast-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .toast-title { font-size: 13px; font-weight: 700; }
    </style>
</head>
<body>

<div id="appToast" class="app-toast">
    <div id="toastIcon" class="toast-icon"></div>
    <div id="toastTitle" class="toast-title"></div>
</div>

<div class="app-container">
    <header>
        <div class="header-top">
            <a href="home.html" class="back-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" fill="none" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </a>
            <div class="page-title">إيداع الأموال البث الحي</div>
            <button class="help-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </button>
        </div>
    </header>

    <div class="section-container" style="animation-delay: 0.1s;">
        <div class="balance-hero">
            <div class="balance-hero-content">
                <div class="balance-label-wrapper">
                    <span class="balance-label" id="balanceLabelName">رصيد التيثر المتاح للتداول</span>
                    <button class="toggle-balance-btn" id="balanceToggleBtn">
                        <svg id="eyeIcon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                    <span class="percent-badge">+8.67%</span>
                </div>
                <div class="balance-value" id="balanceDisplay">
                    <span id="balanceNum">جاري الجلب...</span>
                </div>
            </div>
            <div class="hero-icon">
                <svg viewBox="0 0 24 24" width="32" height="32" stroke="white" fill="none" stroke-width="1.5"><rect x="2" width="20" height="24" rx="2" fill="none"/><path d="M6 12h12M6 8h12M6 16h8"/></svg>
            </div>
        </div>
    </div>

    <div class="section-container" style="animation-delay: 0.2s;">
        <div class="sub-title">اختر عملة الإيداع المباشر</div>
        <div class="currency-selector">
            <div class="currency-card active" data-currency="usdt">
                <div class="curr-icon usdt">₮</div>
                <div class="curr-name">USDT</div>
                <div class="curr-sub">دولار رقمي</div>
            </div>
            <div class="currency-card" data-currency="iqd">
                <div class="curr-icon iqd">ع.د</div>
                <div class="curr-name">IQD</div>
                <div class="curr-sub">دينار عراقي</div>
            </div>
        </div>
    </div>

    <div class="section-container" style="animation-delay: 0.3s;">
        <div class="sub-title">طريقة الدفع المتاحة للعملة</div>
        <div class="methods-container" id="methodsList"></div>
        <div class="payment-details-box" id="paymentDetailsBox"></div>
    </div>

    <div class="section-container" style="animation-delay: 0.4s;">
        <div class="sub-title">حدد مبلغ الإيداع</div>
        <div class="amount-input-wrapper">
            <input type="text" id="amountInput" class="amount-input" placeholder="أدخل القيمة" inputmode="numeric">
            <div class="currency-tag" id="inputCurrencyTag"></div>
        </div>

        <div class="quick-amounts" id="quickAmountsContainer"></div>

        <div class="info-box">
            <div class="info-row"><span class="info-label">الحد الأدنى للايداع</span><span class="info-value" id="minLimitTxt">--</span></div>
            <div class="info-row"><span class="info-label">الحد الأقصى للايداع</span><span class="info-value" id="maxLimitTxt">--</span></div>
            <div class="info-row"><span class="info-label">رسوم المنصه والشبكه</span><span class="info-value" id="feeTxt">--</span></div>
            <div class="info-divider"></div>
            <div class="info-row total-row"><span class="info-label">المبلغ المستلم بالحساب</span><span class="info-value" id="finalAmount">0.00</span></div>
        </div>

        <button class="submit-btn" id="submitDeposit">تأكيد ومتابعة الإيداع الآمن</button>
    </div>

</div>

    const firebaseConfig = {
        apiKey: "AIzaSyCWOr0McRsxLMHehiBA_EIpabnz5CBxp04",
        authDomain: "reivana-8e377.firebaseapp.com",
        projectId: "reivana-8e377",

    const app = initializeApp(firebaseConfig);

    function showAppToast(message, type = "success") {
        const toast = document.getElementById('appToast');
        const icon = document.getElementById('toastIcon');
        const title = document.getElementById('toastTitle');
        
        title.innerText = message;
        if(type === "success") {
            icon.style.background = "rgba(0, 184, 148, 0.2)"; icon.style.color = "#00b894"; icon.innerText = "✓";
        } else {
            icon.style.background = "rgba(255, 118, 117, 0.2)"; icon.style.color = "#ff7675"; icon.innerText = "✕";
        }
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); }, 3500);
    }

    const paymentDetailsData = {
        binance_pay: {
            type: "crypto", network: "BNB Smart Chain (BEP20)",
            networkGradient: "linear-gradient(135deg, #0d9488, #111827)", 
            qrCode: "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=0x4f75ae2f403a51898ade79ccac92d233a3ba8040",

        },
        okx_pay: {
            type: "crypto", network: "Tron (TRC20)",
            networkGradient: "linear-gradient(135deg, #0369a1, #111827)", 
            qrCode: "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=TDBBJwDV5ggo92tEiiDdDN34Wb9ocqgXsx",
            addressLabel: "عنوان محفظة الإيداع الموحد (TRC20)", 
            address: "TDBBJwDV5ggo92tEiiDdDN34Wb9ocqgXsx",
            minNum: 10, maxNum: 100000, fee: "0.50 USDT شبكة", limitTxt: "10 USDT", maxTxt: "100,000 USDT"
        },
        zain_asia: {
            type: "fiat",
            fields: [
                { label: "اسم صاحب المحفظة", value: " قريبا شركة ريفانا للحلول المالية" },
                { label: "رقم المحفظة (زين كاش / آسيا)", value: "12345678" }
            ],
            minNum: 15000, maxNum: 10000000, fee: "0% مجاناً", limitTxt: "15,000 IQD", maxTxt: "10,000,000 IQD"
        },
        iraq_card: {
            type: "fiat",
            fields: [
                { label: "اسم صاحب البطاقة المصرفية", value: "MAHDI RAAD LUTFI" },
                { label: "رقم البطاقة (Visa / MasterCard)", value: "7159284038" }
            ],
            minNum: 8500, maxNum: 5000000, fee: "1% رسوم بوابة", limitTxt: "8,500 IQD", maxTxt: "5,000,000 IQD"
        }
    };

    const currencyData = {
        usdt: {
            name: "USDT", logo: "₮", isCrypto: true, quickValues: [20, 50, 100, 500, 1000],
            methods: [
                { id: "binance_pay", title: "Binance Pay", desc: "إيداع عبر شبكة BEP20 ثابتة تلقائياً", class: "bg-binance", badge: "فوري" },
                { id: "okx_pay", title: "OKX Transfer", desc: "إيداع عبر شبكة TRC20 ترون", class: "bg-okx", badge: "0% رسوم" }
            ]
        },
        iqd: {
            name: "IQD", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Flag_of_Iraq.svg/20px-Flag_of_Iraq.svg.png", isCrypto: false, quickValues: [50000, 100000, 500000, 1000000, 5000000],
            methods: [
                { id: "zain_asia", title: "محفظة إلكترونية", desc: "زين كاش أو آسيا حوالة", class: "bg-wallet", badge: "دينار" },
                { id: "iraq_card", title: "بطاقة مصرفية محلية", desc: "فيزا / ماستركارد العراق", class: "bg-card-pay", badge: "آمن" }
            ]
        }
    };

    let activeCurrency = "usdt";
    let activeMethod = "binance_pay";
    let hasUploadedScreenshot = false;

    function formatNumber(num) { return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }
    
    function refreshBalanceDisplay() {
        const numElem = document.getElementById('balanceNum');
        if (isBalanceHidden) {
            numElem.innerText = "••••••••";
            return;
        }
        if (activeCurrency === "usdt") {
            document.getElementById('balanceLabelName').innerText = "رصيد التيثر المتاح للتداول";
            numElem.innerHTML = `${dbUsdtBalance.toFixed(2)} <span style="font-size:14px;">USDT</span>`;
        } else {
            document.getElementById('balanceLabelName').innerText = "الرصيد النقدي الحالي بالدينار";
            numElem.innerHTML = `${formatNumber(dbIqdBalance)} <span style="font-size:14px;">IQD</span>`;
        }
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            onSnapshot(doc(db, "users", user.uid), (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.data();
                    dbUsdtBalance = Number(data.balanceUSDT || 0);
                    dbIqdBalance = Number(data.balanceIQD || 0);
                    refreshBalanceDisplay();
                }
            });
        } else {
            window.location.href = "login.html";
        }
    });

    window.copyToClipboard = function(text, btnElement) {
        navigator.clipboard.writeText(text).then(() => {
            let originalText = btnElement.innerHTML;
            btnElement.innerHTML = "تم النسخ ✓";
            setTimeout(() => { btnElement.innerHTML = originalText; }, 1500);
        });
    }

    window.triggerScreenshotFile = function() { document.getElementById('screenshotFileInput').click(); }

    window.handleScreenshotChange = function(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('uploadPlaceholderContent').style.display = 'none';
                const preview = document.getElementById('screenshotPreviewImg');
                preview.src = e.target.result;
                preview.style.display = 'block';
                hasUploadedScreenshot = true;
            }
            reader.readAsDataURL(file);
        }
    }

    function renderPaymentDetails(methodId) {
        activeMethod = methodId;
        const box = document.getElementById('paymentDetailsBox');
        const data = paymentDetailsData[methodId];
        
        document.getElementById('minLimitTxt').innerText = data.limitTxt;
        document.getElementById('maxLimitTxt').innerText = data.maxTxt;
        document.getElementById('feeTxt').innerText = data.fee;
        
        box.innerHTML = ""; 
        hasUploadedScreenshot = false; 
        
        let detailsHTML = "";
        if (data.type === "crypto") {
            detailsHTML += `
                <div class="network-badge" style="background: ${data.networkGradient};">الشبكة المعالجة: ${data.network}</div>
                <div class="qr-code-container"><img src="${data.qrCode}" alt="QR Code"></div>
                <div class="copy-field-group">
                    <span class="field-label">${data.addressLabel}</span>
                    <div class="copy-box">
                        <span class="copy-text">${data.address}</span>
                        <button class="copy-btn" onclick="copyToClipboard('${data.address}', this)">نسخ</button>
                    </div>
                </div>
            `;
        } else if (data.type === "fiat") {
            data.fields.forEach(f => {
                detailsHTML += `
                <div class="copy-field-group">
                    <span class="field-label">${f.label}</span>
                    <div class="copy-box">
                        <span class="copy-text">${f.value}</span>
                        <button class="copy-btn" onclick="copyToClipboard('${f.value}', this)">نسخ</button>
                    </div>
                </div>`;
            });
        }

        detailsHTML += `
            <div class="screenshot-upload-group">
                <span class="field-label">إثبات التحويل (لقطة الشاشة)</span>
                <div class="upload-dropzone" onclick="triggerScreenshotFile()">
                    <input type="file" id="screenshotFileInput" accept="image/*" style="display:none;" onchange="handleScreenshotChange(event)">
                    <div id="uploadPlaceholderContent" style="text-align:center; display:flex; flex-direction:column; align-items:center; gap:6px;">
                        <div class="upload-icon">
                            <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" fill="none" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                        </div>
                        <span class="upload-text">اضغط هنا لرفع سكرين التحويل</span>
                        <span class="upload-subtext">يدعم الصور من الاستوديو أو الكاميرا مباشرة</span>
                    </div>
                    <img id="screenshotPreviewImg" class="preview-img" alt="معاينة اللقطة">
                </div>
            </div>
        `;

        box.innerHTML = detailsHTML;
        box.style.display = "flex";
        updateFinalAmount();
    }

    function updateFinalAmount() {
        const val = document.getElementById('amountInput').value.replace(/,/g, '');
        const currencyName = currencyData[activeCurrency].name;
        if(val && !isNaN(val)) {
            document.getElementById('finalAmount').innerText = `${formatNumber(val)} ${currencyName}`;
        } else {
            document.getElementById('finalAmount').innerText = `0.00 ${currencyName}`;
        }
    }

    function renderCurrencyUI(currencyKey) {
        activeCurrency = currencyKey;
        const data = currencyData[currencyKey];
        document.getElementById('amountInput').value = ""; 
        refreshBalanceDisplay();
        
        if(data.isCrypto) {
            document.getElementById('inputCurrencyTag').innerHTML = `${data.name} <span style="color:#26a17b; font-weight:bold;">${data.logo}</span>`;
        } else {
            document.getElementById('inputCurrencyTag').innerHTML = `${data.name} <img src="${data.logo}" class="curr-logo-img">`;
        }

        const methodsListContainer = document.getElementById('methodsList');
        methodsListContainer.innerHTML = "";
        
        data.methods.forEach((method, index) => {
            const item = document.createElement('div');
            item.className = `method-item ${index === 0 ? 'selected' : ''}`;
            item.setAttribute('data-id', method.id);
            item.innerHTML = `
                <div class="method-left">
                    <div class="method-icon ${method.class}">
                        ${method.id === 'binance_pay' ? 'B' : method.id === 'okx_pay' ? 'O' : method.id === 'iraq_card' ? '💳' : '📱'}
                    </div>
                    <div class="method-info">
                        <div class="method-title">${method.title}</div>
                        <div class="method-desc">${method.desc}</div>
                    </div>
                </div>
                <div class="method-right"><span class="fee-badge">${method.badge}</span></div>
            `;
            
            item.addEventListener('click', () => {
                document.querySelectorAll('.method-item').forEach(m => m.classList.remove('selected'));
                item.classList.add('selected');
                renderPaymentDetails(method.id);
            });
            methodsListContainer.appendChild(item);
        });

        renderPaymentDetails(data.methods[0].id);

        const quickAmountsContainer = document.getElementById('quickAmountsContainer');
        quickAmountsContainer.innerHTML = "";
        data.quickValues.forEach((val, index) => {
            const btn = document.createElement('button');
            btn.className = `quick-btn ${index === 2 ? 'active' : ''}`;
            btn.innerText = data.isCrypto ? `$${val}` : (val >= 1000000 ? `${val/1000000}M` : `${val/1000}K`);
            
            btn.addEventListener('click', () => {
                document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('amountInput').value = formatNumber(val);
                updateFinalAmount();
            });
            quickAmountsContainer.appendChild(btn);
            
            if(index === 2) {
                document.getElementById('amountInput').value = formatNumber(val);
                updateFinalAmount();
            }
        });
    }

    document.querySelectorAll('.currency-card').forEach(card => {
        card.addEventListener('click', () => {
            document.querySelectorAll('.currency-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            renderCurrencyUI(card.getAttribute('data-currency'));
        });
    });

    document.getElementById('amountInput').addEventListener('input', function() {
        let rawValue = this.value.replace(/[^0-9]/g, '');
        if(rawValue !== '') this.value = formatNumber(rawValue);
        else this.value = '';
        updateFinalAmount();
        document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
    });

    document.getElementById('balanceToggleBtn').addEventListener('click', () => {
        isBalanceHidden = !isBalanceHidden;
        refreshBalanceDisplay();
    });

    window.addEventListener('DOMContentLoaded', () => { renderCurrencyUI('usdt'); });

    // 🚀 دالة معالجة الإيداع باستخدام رفع ImgBB والربط مع Firestore
    document.getElementById('submitDeposit').addEventListener('click', async () => {
        if (!currentUser) {
            showAppToast("يجب تسجيل الدخول أولاً لإجراء عملية إيداع.", "error");
            return;
        }

        const inputVal = parseFloat(document.getElementById('amountInput').value.replace(/,/g, ''));
        const methodInfo = paymentDetailsData[activeMethod];

        if (!inputVal || isNaN(inputVal) || inputVal <= 0) {
            showAppToast("يرجى إدخال مبلغ صالح للايداع أولاً.", "error");
            return;
        }
        if (inputVal < methodInfo.minNum) {
            showAppToast(`الحد الأدنى للايداع هو: ${methodInfo.limitTxt}`, "error");
            return;
        }
        if (inputVal > methodInfo.maxNum) {
            showAppToast(`الحد الأقصى المسموح به هو: ${methodInfo.maxTxt}`, "error");
            return;
        }
        
        const fileInput = document.getElementById('screenshotFileInput');
        if(!hasUploadedScreenshot || !fileInput || !fileInput.files[0]) {
            showAppToast("يجب رفع لقطة الشاشة (سكرين شوت) للتحويل لتوثيق طلبك.", "error");
            return;
        }

        if (IMGBB_API_KEY === "" || !IMGBB_API_KEY) {
            alert("خطأ: يرجى إعداد مفتاح ImgBB API أولاً داخل الكود.");
            return;
        }

        const btn = document.getElementById('submitDeposit');
        const origText = btn.innerHTML;
        btn.innerHTML = `<svg class="spin" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> جاري رفع الوصل وتأكيد الطلب...`;
        btn.style.pointerEvents = "none";
        btn.style.opacity = "0.7";

        try {
            const file = fileInput.files[0];
            
            // 1. تجهيز الصورة وإرسالها إلى سيرفر ImgBB
            const formData = new FormData();
            formData.append("image", file);

            const imgbbResponse = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });

            const imgbbResult = await imgbbResponse.json();

            if (!imgbbResult.success) {
                throw new Error(imgbbResult.error ? imgbbResult.error.message : "فشل الرفع إلى ImgBB");
            }

            // رابط الصورة المباشر المستضاف على ImgBB
            const downloadURL = imgbbResult.data.url;

            // 2. إرسال مستند الطلب إلى قاعدة بيانات Firestore (كولكشن deposits)
            await addDoc(collection(db, "deposits"), {
                userId: currentUser.uid,
                amount: inputVal,
                currency: activeCurrency,
                method: activeMethod,
                screenshotUrl: downloadURL,
                status: "pending", 
                createdAt: serverTimestamp()
            });

            showAppToast("تم إرسال طلب إيداعك بنجاح! سيتم مراجعته فوراً.");
            setTimeout(() => { window.location.reload(); }, 2000);

        } catch (error) {
            console.error(error);
            alert("حدث خطأ أثناء معالجة الطلب: " + error.message);
            showAppToast("حدث خطأ أثناء الرفع، أعد المحاولة.", "error");
            btn.innerHTML = origText;
            btn.style.pointerEvents = "auto";
            btn.style.opacity = "1";
        }
    });
</script>

</body>
</html>
