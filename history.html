<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivana - سجل العمليات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-body: #06080e;
            --bg-card: #111424;
            --bg-hover: #181d33;
            --primary-purple: #7c3aed;
            --light-purple: #a78bfa;
            --text-main: #ffffff;
            --text-muted: #8b94a5;
            --success-green: #10b981;
            --danger-red: #ef4444;
            --warning-gold: #fbbf24;
            --border-color: rgba(255, 255, 255, 0.05);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            height: 100vh; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column;
        }

        /* ================= Header (شريط الرجوع) ================= */
        .top-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .back-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
        }

        .back-btn:hover {
            background: var(--bg-hover);
            color: var(--light-purple);
        }

        .page-title {
            font-size: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title i { color: var(--primary-purple); }

        /* ستايل صورة البروفايل في الهيدر */
        .header-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-purple);
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.3);
        }

        /* ================= محتوى السجل ================= */
        .content-wrapper { 
            padding: 30px; 
            max-width: 1200px;
            margin: 0 auto; 
            width: 100%;
            flex: 1;
        }

        .table-section { 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .table-header h3 { font-size: 18px; font-weight: 700; }

        /* ستايل الجدول */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: right; padding: 0 10px 15px; font-size: 14px; color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border-color); }
        td { padding: 18px 10px; border-bottom: 1px solid rgba(255,255,255,0.02); vertical-align: middle; }
        tr:hover td { background: rgba(255,255,255,0.01); }
        
        .op-type { display: flex; align-items: center; gap: 15px; }
        .op-icon { width: 45px; height: 45px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 18px; }
        .op-icon.purple { background: rgba(124, 58, 237, 0.1); color: var(--light-purple); }
        .op-icon.red { background: rgba(239, 68, 68, 0.1); color: var(--danger-red); }
        .op-icon.green { background: rgba(16, 185, 129, 0.1); color: var(--success-green); }
        
        .op-name { font-size: 14px; font-weight: 700; display: block; }
        .op-sub { font-size: 12px; color: var(--text-muted); direction: ltr; text-align: right;}
        
        .amt-main { font-size: 16px; font-weight: 800; display: block; direction: ltr; text-align: right; }
        .amt-main.green { color: var(--success-green); }
        .amt-main.red { color: var(--danger-red); }

        .status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 8px; background: rgba(255,255,255,0.03);}
        .s-success { color: var(--success-green); border: 1px solid rgba(16, 185, 129, 0.2); }
        .s-pending { color: var(--warning-gold); border: 1px solid rgba(251, 191, 36, 0.2); }
        .s-rejected { color: var(--danger-red); border: 1px solid rgba(239, 68, 68, 0.2); }

        @media (max-width: 768px) {
            .content-wrapper { padding: 15px; }
            .top-header { padding: 15px 20px; }
            .table-section { padding: 15px; overflow-x: auto;}
            table { min-width: 600px; }
        }
    </style>
</head>
<body>

    <header class="top-header">
       <a href="#" class="back-btn" onclick="handleSmartBack(event)">
    <i class="fa-solid fa-arrow-right"></i>
</a>

        
        <div class="page-title">
            <i class="fa-solid fa-file-invoice-dollar"></i> سجل العمليات
        </div>

        <div>
            <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=7c3aed&color=fff" alt="Profile" class="header-avatar">
        </div>
    </header>

    <div class="content-wrapper">
        <div class="table-section">
            <div class="table-header">
                <h3>جميع العمليات السابقة</h3>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th style="text-align: right;">العملية</th>
                        <th style="text-align: right;">التاريخ</th>
                        <th style="text-align: right;">المبلغ</th>
                        <th style="text-align: right;">الحالة</th>
                    </tr>
                </thead>
                <tbody id="operationsTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        // استدعاء مكتبات الفايربيس (استخدمي الروابط الخاصة بك إذا كانت مختلفة)
        import { getFirestore, collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        const auth = getAuth();
        const db = getFirestore();
        const tableBody = document.getElementById('operationsTableBody');
        const userAvatar = document.getElementById('userAvatar');

        // دالة تحويل حالة العملية
        function getStatusBadge(status) {
            if (status === 'completed' || status === 'مكتمل' || status === 'approved') {
                return `<span class="status s-success"><i class="fa-regular fa-circle-check"></i> مكتملة</span>`;
            } else if (status === 'pending' || status === 'قيد المعالجة') {
                return `<span class="status s-pending"><i class="fa-regular fa-clock"></i> قيد المعالجة</span>`;
            } else if (status === 'rejected' || status === 'مرفوض') {
                return `<span class="status s-rejected"><i class="fa-solid fa-xmark"></i> مرفوضة</span>`;
            }
            return `<span class="status s-pending">${status}</span>`; 
        }

        // دالة جلب العمليات (المحدثة لتشمل الإيداع والسحب معاً)
        async function fetchUserTransactions(userId) {
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 30px;">جاري تحميل سجل العمليات... <i class="fa-solid fa-spinner fa-spin"></i></td></tr>';
            
            try {
                // 1. تجهيز استعلام السحوبات
                const withdrawalsRef = collection(db, "withdrawals");
                const qWithdrawals = query(withdrawalsRef, where("userId", "==", userId));

                // 2. تجهيز استعلام الإيداعات
                const depositsRef = collection(db, "deposits");
                const qDeposits = query(depositsRef, where("userId", "==", userId));

                // 3. جلب البيانات من المجموعتين في نفس الوقت (لزيادة السرعة)
                const [withdrawalsSnap, depositsSnap] = await Promise.all([
                    getDocs(qWithdrawals),
                    getDocs(qDeposits)
                ]);

                // 4. تجميع البيانات في مصفوفة واحدة
                let allTransactions = [];

                withdrawalsSnap.forEach((doc) => {
                    allTransactions.push({ id: doc.id, type: 'withdraw', ...doc.data() });
                });

                depositsSnap.forEach((doc) => {
                    allTransactions.push({ id: doc.id, type: 'deposit', ...doc.data() });
                });

                // 5. ترتيب العمليات من الأحدث للأقدم بناءً على وقت الإنشاء
                allTransactions.sort((a, b) => {
                    const timeA = a.createdAt ? a.createdAt.toMillis() : 0;
                    const timeB = b.createdAt ? b.createdAt.toMillis() : 0;
                    return timeB - timeA;
                });

                tableBody.innerHTML = ''; 

                if (allTransactions.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 30px; color: var(--text-muted);">لا توجد أي عمليات سابقة في حسابك.</td></tr>';
                    return;
                }

                // 6. عرض العمليات في الجدول
                allTransactions.forEach((data) => {
                    // توحيد قراءة المبلغ
                    const amount = data.amountRequested || data.amount || data.netAmount || 0;
                    const currency = data.currency || (data.type === 'withdraw' ? 'IQD' : 'USDT'); 
                    // إذا كان إيداع وكان هناك طريقة نأخذها، وإلا نضع اسم افتراضي
                    const method = data.method || 'محفظة/بوابة';
                    
                    const dateObj = data.createdAt ? data.createdAt.toDate() : new Date();
                    const dateStr = dateObj.toLocaleDateString('ar-EG', { day: 'numeric', month: 'long', year: 'numeric' });
                    const timeStr = dateObj.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

                    const isDeposit = data.type === 'deposit'; 
                    
                    const iconClass = isDeposit ? 'green' : 'red';
                    const iconSymbol = isDeposit ? 'fa-arrow-down' : 'fa-arrow-up';
                    const amountClass = isDeposit ? 'green' : 'red';
                    const amountPrefix = isDeposit ? '+' : '-';
                    const operationName = isDeposit ? 'إيداع رصيد' : 'سحب أموال';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>
                            <div class="op-type">
                                <div class="op-icon ${iconClass}"><i class="fa-solid ${iconSymbol}"></i></div>
                                <div>
                                    <span class="op-name">${operationName}</span>
                                    <span class="op-sub" style="text-transform: uppercase;">${method.replace('_', ' ')}</span>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span class="op-name">${dateStr}</span>
                            <span class="op-sub">${timeStr}</span>
                        </td>
                        <td>
                            <span class="amt-main ${amountClass}">${amountPrefix}${Number(amount).toLocaleString()} ${currency.toUpperCase()}</span>
                        </td>
                        <td>
                            ${getStatusBadge(data.status)}
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });

            } catch (error) {
                console.error("خطأ في جلب العمليات:", error);
                tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 30px; color: var(--danger-red);">حدث خطأ أثناء جلب البيانات. الرجاء المحاولة لاحقاً.</td></tr>';
            }
        }


        // مراقبة حالة المستخدم وضبط صورته الشخصية
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // جلب اسم المستخدم أو وضع اسم افتراضي
                const userName = user.displayName || 'مستخدم';
                
                // إذا كان لدى المستخدم صورة مرفوعة مسبقاً في Firebase، نستخدمها
                if (user.photoURL) {
                    userAvatar.src = user.photoURL;
                } else {
                    // إذا لم يكن لديه صورة، نصنع صورة تحمل أول حرف من اسمه بلون التطبيق (بنفسجي)
                    userAvatar.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(userName)}&background=7c3aed&color=fff&bold=true`;
                }

                // جلب العمليات الخاصة به
                fetchUserTransactions(user.uid);
            } else {
                tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 30px;">يرجى تسجيل الدخول لعرض سجل العمليات.</td></tr>';
            }
        });
    </script>
    <script>
    function handleSmartBack(event) {
        event.preventDefault(); // نمنع الرابط من التصرف الافتراضي
        
        // نتأكد إذا اكو صفحة سابقة بسجل المتصفح
        if (window.history.length > 1 && document.referrer !== "") {
            // يرجع خطوة وحدة لورا (سواء جانت الهوم أو البروفايل)
            window.history.back(); 
        } else {
            // حالة احتياطية: إذا المستخدم فتح صفحة سجل العمليات برابط مباشر
            // نرجعه للصفحة الرئيسية كإجراء افتراضي
            window.location.href = "home.html"; 
        }
    }
</script>

</body>
</html>
