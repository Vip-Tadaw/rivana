<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rivana - الدعم الفني والمساعدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-body: #06080e;
            --bg-card: #111424;
            --bg-hover: #181d33;
            --primary-purple: #7c3aed;
            --light-purple: #a78bfa;
            --text-main: #ffffff;
            --text-muted: #8b94a5;
            --border-color: rgba(255, 255, 255, 0.05);
            --transition: all 0.3s ease;
            --danger-red: #ef4444;
            --success-green: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent;}
        
       body { 
    background-color: var(--bg-body); 
    color: var(--text-main); 
    height: 100vh; /* كاحتياط للمتصفحات القديمة جداً */
    height: 100dvh; /* الحل السحري الذي يتكيف مع شريط الهاتف */
    display: flex; 
    flex-direction: column;
    overflow: hidden; 
}


        /* ================= نظام الإشعارات المنبثقة (Toast) ================= */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-card);
            color: var(--text-main);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--primary-purple);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .toast.error { border-color: var(--danger-red); }
        .toast.error i { color: var(--danger-red); }
        .toast.success { border-color: var(--success-green); }
        .toast.success i { color: var(--success-green); }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }

        /* === تصميم علامات القراءة (الصح الأزرق) === */
        .msg-ticks {
            font-size: 11px;
            margin-right: 5px;
            color: var(--text-muted);
        }
        .msg-ticks.read {
            color: #3b82f6;
        }

        /* ================= Header ================= */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 25px;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .header-right { display: flex; align-items: center; gap: 15px; }
        
        .back-btn {
            width: 40px; height: 40px; background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border-color); border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            color: var(--text-main); cursor: pointer; text-decoration: none; transition: var(--transition);
        }
        .back-btn:hover { background: var(--bg-hover); color: var(--light-purple); }

        .support-info { display: flex; align-items: center; gap: 12px; }
        .support-avatar {
            width: 45px; height: 45px; border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            display: flex; justify-content: center; align-items: center; font-size: 20px;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.4);
        }
        .support-details h3 { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
        .support-details p { font-size: 12px; color: #10b981; display: flex; align-items: center; gap: 5px;}
        .support-details p::before { content: ''; width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #10b981;}

        /* ================= Chat Area ================= */
        .chat-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }
        
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .message-wrapper { display: flex; flex-direction: column; max-width: 80%; }
        
        /* رسائل المستخدم (تظهر على اليمين بالبنفسجي) */
        .msg-user { align-self: flex-start; }
        .msg-user .msg-bubble {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: white; border-radius: 20px 20px 0 20px;
            box-shadow: 0 5px 15px rgba(124, 58, 237, 0.2);
        }

        /* رسائل الإدارة (تظهر على اليسار باللون الداكن) */
        .msg-admin { align-self: flex-end; }
        .msg-admin .msg-bubble {
            background: var(--bg-hover);
            color: var(--text-main); border-radius: 20px 20px 20px 0;
            border: 1px solid var(--border-color);
        }

        .msg-bubble { padding: 12px 18px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .msg-time { font-size: 10px; color: var(--text-muted); margin-top: 5px; padding: 0 5px; }
        .msg-user .msg-time { text-align: right; }
        .msg-admin .msg-time { text-align: left; }

        .welcome-msg { text-align: center; color: var(--text-muted); font-size: 12px; margin: 20px 0; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 10px; border: 1px dashed var(--border-color);}

        /* === تصميم أزرار الأسئلة الشائعة === */
        .faq-chips-container {
            display: flex;
            gap: 10px;
            padding: 10px 25px;
            background: var(--bg-body);
            overflow-x: auto;
            border-top: 1px solid var(--border-color);
        }
        .faq-chips-container::-webkit-scrollbar { height: 0; display: none; }
        .faq-chip {
            background: var(--bg-card);
            color: var(--light-purple);
            border: 1px solid rgba(124, 58, 237, 0.4);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: var(--transition);
        }
        .faq-chip:hover {
            background: var(--primary-purple);
            color: white;
        }

       .chat-input-area {
    padding: 15px 25px; 
    background: var(--bg-card); 
    border-top: 1px solid var(--border-color);
    display: flex; 
    align-items: center; 
    gap: 10px; 
    /* تعديل بسيط لضمان المسافة الآمنة */
    padding-bottom: calc(15px + env(safe-area-inset-bottom));
}

        .chat-input {
            flex: 1; background: var(--bg-body); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 14px 20px; color: var(--text-main); font-size: 14px;
            outline: none; transition: var(--transition);
        }
        .chat-input:focus { border-color: var(--primary-purple); }
        .chat-input::placeholder { color: var(--text-muted); }

        .send-btn {
            width: 50px; height: 50px; background: var(--primary-purple); color: white;
            border: none; border-radius: 50%; font-size: 18px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: var(--transition); box-shadow: 0 5px 15px rgba(124, 58, 237, 0.4);
        }
        .send-btn:hover { background: #8b5cf6; transform: scale(1.05); }
        .send-btn:disabled { background: var(--text-muted); cursor: not-allowed; box-shadow: none; transform: scale(1);}

        @media (max-width: 768px) {
            .chat-header { padding: 12px 15px; }
            .chat-input-area { padding: 12px 15px; }
            .message-wrapper { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>

    <header class="chat-header">
        <div class="header-right">
            <a href="profile.html" class="back-btn">
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <div class="support-info">
                <div class="support-avatar"><i class="fa-solid fa-headset"></i></div>
                <div class="support-details">
                    <h3>فريق دعم Rivana</h3>
                    <p>متصل الآن لمساعدتك</p>
                </div>
            </div>
        </div>
    </header>

    <div class="chat-area" id="chatBox">
        <div class="welcome-msg">
            أهلاً بك في الدعم الفني! 👋<br>
            كيف يمكننا مساعدتك اليوم؟ يرجى كتابة استفسارك وسنرد عليك في أقرب وقت.
        </div>
    </div>

    <div class="faq-chips-container" id="faqContainer">
        <div class="faq-chip" onclick="sendFaqMessage('كيف يمكنني إيداع الرصيد في حسابي؟')">💰 كيفية الإيداع</div>
        <div class="faq-chip" onclick="sendFaqMessage('لقد طلبت سحب الرصيد ولم يصلني بعد.')">⏳ تأخر السحب</div>
        <div class="faq-chip" onclick="sendFaqMessage('أريد الاستفسار عن باقات الاشتراك المتاحة.')">📦 الباقات والاشتراكات</div>
        <div class="faq-chip" onclick="sendFaqMessage('لدي مشكلة تقنية في المنصة.')">🛠️ مشكلة تقنية</div>
    </div>
    
    <div class="chat-input-area">
        <input type="text" id="msgInput" class="chat-input" placeholder="اكتب رسالتك هنا..." autocomplete="off">
        <button id="sendBtn" class="send-btn" disabled><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, getDoc, setDoc, updateDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyCWOr0McRsxLMHehiBA_EIpabnz5CBxp04",
            authDomain: "reivana-8e377.firebaseapp.com",
            projectId: "reivana-8e377",
            storageBucket: "reivana-8e377.firebasestorage.app",
            messagingSenderId: "1066129522960",
            appId: "1:1066129522960:web:8179e50a906fd08ee96595"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUserId = null;
        let userData = { name: "مستخدم ريفانا", photoURL: "" }; 
        let lastMessageTimeLocal = 0; 
        const COOLDOWN_TIME = 2000; 

        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');

        // نظام الإشعارات المنبثقة
        function showNotification(message, type = 'error') {
            const container = document.getElementById('toast-container');
            if (!container) return; 
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check';
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
            
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // مراقبة حالة المستخدم
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                listenToBanStatus(currentUserId);
                
                try {
                    const userDoc = await getDoc(doc(db, "users", currentUserId));
                    if (userDoc.exists()) {
                        const data = userDoc.data();
                        userData.name = data.name || data.fullName || "مستخدم ريفانا";
                        userData.photoURL = data.photoURL || "";
                    }
                } catch (e) {
                    console.error("خطأ في جلب بيانات المستخدم المحدثة:", e);
                }

                clearUnreadCounter();
                loadMessages();
            } else {
                chatBox.innerHTML += `<div class="welcome-msg" style="color:#ef4444; border-color:#ef4444;">يرجى تسجيل الدخول لتتمكن من مراسلة الدعم الفني.</div>`;
            }
        });

        msgInput.addEventListener('input', () => {
            sendBtn.disabled = msgInput.value.trim() === '';
        });

        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && msgInput.value.trim() !== '') {
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        async function sendMessage() {
            const currentTime = Date.now();
            if (currentTime - lastMessageTimeLocal < COOLDOWN_TIME) {
                const originalPlaceholder = msgInput.placeholder;
                msgInput.value = "";
                msgInput.placeholder = "⏳ الرجاء الانتظار قليلاً قبل إرسال رسالة أخرى...";
                msgInput.disabled = true;
                sendBtn.disabled = true;
                
                setTimeout(() => {
                    msgInput.placeholder = originalPlaceholder;
                    msgInput.disabled = false;
                    msgInput.focus();
                }, COOLDOWN_TIME - (currentTime - lastMessageTimeLocal));
                
                return; 
            }
            
            lastMessageTimeLocal = Date.now();
            const text = msgInput.value.trim();

            if (!text) return;

            msgInput.value = '';
            sendBtn.disabled = true;

            const tempId = "temp_" + Date.now();
            const tempMessageHTML = `
                <div id="${tempId}" class="message-wrapper msg-user" style="opacity: 0.7;">
                    <div class="msg-bubble">${text}</div>
                    <div class="msg-time">جاري الإرسال...</div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', tempMessageHTML);
            scrollToBottom();

            try {
                const messagesRef = collection(db, "support_chats", currentUserId, "messages");
                await addDoc(messagesRef, {
                    text: text,
                    sender: 'user',
                    timestamp: serverTimestamp(),
                    isRead: false
                });

                const chatRoomRef = doc(db, "support_chats", currentUserId);
                const roomSnap = await getDoc(chatRoomRef);
                let currentUnreadByAdmin = 0;
                if (roomSnap.exists()) {
                    currentUnreadByAdmin = roomSnap.data().unreadByAdmin || 0;
                }

                await setDoc(chatRoomRef, {
                    userId: currentUserId,
                    userName: userData.name,
                    userPhoto: userData.photoURL,
                    lastMessage: text,
                    lastMessageTime: serverTimestamp(),
                    lastSender: 'user',
                    unreadByAdmin: currentUnreadByAdmin + 1, 
                    unreadByUser: 0 
                }, { merge: true });

            } catch (error) {
                console.error("خطأ في إرسال الرسالة: ", error);
                const tempMsgElem = document.getElementById(tempId);
                if(tempMsgElem) tempMsgElem.remove();
                
                showNotification("تعذر إرسال الرسالة، يرجى التحقق من القواعد أو الاتصال.", "error");
                msgInput.value = text;
                sendBtn.disabled = false;
            }
        }

        window.sendFaqMessage = function(text) {
            if (!currentUserId) {
                showNotification("يرجى تسجيل الدخول أولاً.", "error");
                return;
            }
            
            msgInput.value = text;
            const faqContainer = document.getElementById('faqContainer');
            if (faqContainer) {
                faqContainer.style.display = 'none';
            }
            sendMessage();
        };

        function listenToBanStatus(uid) {
            if (!uid) return;
            const roomRef = doc(db, "support_chats", uid);
            
            onSnapshot(roomRef, (docSnap) => {
                const faqContainer = document.getElementById('faqContainer');

                if (docSnap.exists()) {
                    const roomData = docSnap.data();
                    const isBanned = roomData.isBanned || false;

                    if (isBanned) {
                        msgInput.value = "";
                        msgInput.placeholder = "🚫 تم حظر حسابك من إرسال رسائل للدعم الفني.";
                        msgInput.disabled = true;
                        sendBtn.disabled = true;
                        if (faqContainer) faqContainer.style.display = 'none';
                    } else {
                        if (msgInput.placeholder.includes("تم حظر حسابك")) {
                            msgInput.placeholder = "اكتب رسالتك هنا...";
                            msgInput.disabled = false;
                            if (faqContainer) faqContainer.style.display = 'flex';
                        }
                    }
                }
            });
        }

        let typingTimeout = null;
        if (msgInput) {
            msgInput.addEventListener('input', async () => {
                if (!currentUserId) return;
                
                try {
                    const roomRef = doc(db, "support_chats", currentUserId);
                    await updateDoc(roomRef, { isUserTyping: true });
                    
                    if (typingTimeout) clearTimeout(typingTimeout);
                    
                    typingTimeout = setTimeout(async () => {
                        await updateDoc(roomRef, { isUserTyping: false });
                    }, 1500);
                    
                } catch (error) {
                    console.error("خطأ في مؤشر الكتابة:", error);
                }
            });
        }

        function loadMessages() {
            const messagesRef = collection(db, "support_chats", currentUserId, "messages");
            const q = query(messagesRef, orderBy("timestamp", "asc"));

            onSnapshot(q, (snapshot) => {
                const welcomeHTML = `<div class="welcome-msg">أهلاً بك في الدعم الفني! 👋<br>كيف يمكننا مساعدتك اليوم؟ يرجى كتابة استفسارك وسنرد عليك في أقرب وقت.</div>`;
                chatBox.innerHTML = welcomeHTML;

                snapshot.forEach((msgDoc) => {
                    const data = msgDoc.data();
                    const isAdmin = data.sender === 'admin'; 
                    
                    let timeString = 'الآن';
                    if (data.timestamp) {
                        const date = data.timestamp.toDate();
                        timeString = date.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
                    }

                    const isReadClass = data.isRead ? "read" : ""; 
                    // التعديل: تظهر علامات الصح لرسائل المستخدم وليس رسائل الأدمن
                    const ticksHtml = !isAdmin ? `<span class="msg-ticks ${isReadClass}"><i class="fa-solid fa-check-double"></i></span>` : "";

                    const messageHTML = `
                        <div class="message-wrapper ${isAdmin ? 'msg-admin' : 'msg-user'}">
                            <div class="msg-bubble">
                                <p>${data.text}</p>
                                <div class="msg-meta" style="display: flex; align-items: center; justify-content: flex-end; gap: 3px; margin-top: 4px; font-size: 10px; opacity: 0.7;">
                                    <span class="msg-time">${timeString}</span>
                                    ${ticksHtml}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    chatBox.innerHTML += messageHTML;
                });

                clearUnreadCounter();
                scrollToBottom();
            }, (error) => {
                console.error("خطأ في قراءة الرسائل: ", error);
                showNotification("حدث خطأ أثناء تحميل المحادثة.", "error");
            });
        }

        async function clearUnreadCounter() {
            if (!currentUserId) return;
            try {
                const chatRoomRef = doc(db, "support_chats", currentUserId);
                await setDoc(chatRoomRef, { unreadByUser: 0 }, { merge: true });
            } catch (e) {
                console.error(e);
            }
        }

        function scrollToBottom() {
            setTimeout(() => {
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 100);
        }
    </script>
</body>
</html>
