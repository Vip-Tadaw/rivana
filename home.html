<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rivana | لوحة التحكم</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        /* ================= المتغيرات والألوان ================= */
        :root {
            --bg-main: #0B0E17;
            --bg-card: #151828;
            --bg-card-hover: #1e2235;
            --primary: #7c3aed;
            --primary-gradient: linear-gradient(135deg, #3b82f6, #7c3aed); 
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --success: #10b981;
            --danger: #ef4444;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        /* ================= الإعدادات العامة ================= */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background-color: #05060A; color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .app-container { width: 100%; max-width: 480px; height: 100vh; background-color: var(--bg-main); position: relative; overflow-y: auto; overflow-x: hidden; padding-bottom: 90px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .app-container::-webkit-scrollbar { width: 0; display: none; }
        a { text-decoration: none; color: inherit; }

        /* حركات السلايدر (التمرير والتلاشي) */
        .fade-in { animation: fadeIn 0.8s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        .slide-up { animation: slideUp 0.5s ease-out forwards; opacity: 0; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* ================= الهيدر ================= */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; position: sticky; top: 0; background: rgba(11, 14, 23, 0.85); backdrop-filter: blur(12px); z-index: 100; }
        .header-left, .header-right { display: flex; align-items: center; gap: 15px; }
        .logo-area { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 20px; letter-spacing: 1px;}
        .logo-text { background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-area svg { width: 24px; height: 24px; }
        .notification-btn { position: relative; background: none; border: none; color: white; cursor: pointer; }
        .badge { position: absolute; top: -2px; right: -2px; background: var(--danger); color: white; font-size: 10px; font-weight: 700; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg-main); }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-color); cursor: pointer;}
        .menu-btn { background: none; border: none; color: white; cursor: pointer; display: flex;}

        /* ================= الأقسام الداخلية ================= */
        .section-container { padding: 0 20px; margin-bottom: 24px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .section-title { font-size: 16px; font-weight: 700; }
        .view-all { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; transition: color 0.3s;}
        .view-all:hover { color: var(--primary); }

        /* ================= بطاقة الرصيد ================= */
        .balance-card { background: var(--primary-gradient); border-radius: 24px; padding: 24px; position: relative; overflow: hidden; box-shadow: 0 15px 30px rgba(124, 58, 237, 0.2); }
        .balance-card::before { content: ''; position: absolute; top: 0; right: 0; bottom: 0; left: 0; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M0,50 Q25,20 50,50 T100,50 L100,100 L0,100 Z" fill="rgba(255,255,255,0.05)"/></svg>') no-repeat bottom; background-size: cover; pointer-events: none; }
        .balance-header { display: flex; align-items: center; gap: 8px; font-size: 14px; color: rgba(255,255,255,0.8); margin-bottom: 8px; z-index: 1; position: relative;}
        .eye-btn { background: none; border: none; color: inherit; cursor: pointer; display: flex; }
        .balance-amount { font-size: 30px; font-weight: 700; display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; z-index: 1; position: relative;}
        .currency { font-size: 16px; font-weight: 500; opacity: 0.8;}
        .balance-change { font-size: 13px; color: #a7f3d0; margin-bottom: 24px; z-index: 1; position: relative;}
        .action-buttons { display: flex; gap: 12px; z-index: 1; position: relative;}
        .action-btn { flex: 1; background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 12px 5px; color: white; font-family: inherit; font-size: 13px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: all 0.3s; backdrop-filter: blur(10px); }
        .action-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-3px); }
        .action-btn .icon-box { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; }

        /* ================= اختصارات سريعة ================= */
        .quick-shortcuts-title { font-size: 14px; margin-bottom: 12px; padding: 0 20px; color: var(--text-muted);}
        .quick-shortcuts { display: flex; gap: 16px; overflow-x: auto; padding: 0 20px 10px; scrollbar-width: none; }
        .quick-shortcuts::-webkit-scrollbar { display: none; }
        .shortcut-item { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 60px; cursor: pointer; }
        .shortcut-icon { width: 50px; height: 50px; border-radius: 18px; background: var(--bg-card); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; color: #3b82f6; transition: all 0.3s; }
        .shortcut-item:hover .shortcut-icon { background: var(--bg-card-hover); border-color: var(--primary); transform: scale(1.05); }
        .shortcut-text { font-size: 12px; font-weight: 500; color: var(--text-muted); text-align: center; white-space: nowrap; }
/* ================= شريط التنقل السفلي الموحد ================= */
body {
    padding-bottom: 75px !important;
}

.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    max-width: 480px; 
    margin: 0 auto;
    background: rgba(11, 14, 23, 0.95);
    backdrop-filter: blur(15px);
    border-top: 1px solid var(--border-color);
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px 0 15px; /* مسافات داخلية متناسقة */
    z-index: 9999;
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
}

.bottom-nav .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    gap: 5px;
    transition: all 0.3s ease;
    flex: 1; /* يضمن توزيع الأزرار الخمسة بالتساوي بدون ضغط */
}

.bottom-nav .nav-item svg {
    width: 24px;
    height: 24px;
    stroke: currentColor;
    stroke-width: 1.5;
    fill: none;
    transition: all 0.3s ease;
}

.bottom-nav .nav-item.active {
    color: var(--primary);
}

.bottom-nav .nav-item.active svg {
    stroke-width: 2.2;
    transform: translateY(-3px);
    filter: drop-shadow(0 4px 6px rgba(124, 58, 237, 0.4));
}


        /* ================= VIP ================= */
        .vip-card { background: var(--bg-card); border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border-color); position: relative; overflow: hidden; transition: all 0.3s; }
        .vip-card:hover { border-color: rgba(124, 58, 237, 0.4); }
        .vip-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--primary-gradient); }
        .vip-info { display: flex; align-items: center; gap: 12px; }
        .vip-icon { width: 44px; height: 44px; border-radius: 50%; background: rgba(59, 130, 246, 0.15); display: flex; align-items: center; justify-content: center; color: #3b82f6; }
        .vip-level { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .vip-xp { font-size: 12px; color: var(--text-muted); }
        .progress-bar-bg { width: 120px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 6px; overflow: hidden;}
        .progress-bar-fill { width: 44%; height: 100%; background: var(--primary-gradient); border-radius: 2px; }

        /* ================= ملخص السوق ================= */
        .coin-list { display: flex; flex-direction: column; gap: 12px; }
        .coin-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg-card); padding: 12px 16px; border-radius: 16px; border: 1px solid transparent; transition: all 0.3s; cursor: pointer; }
        .coin-item:hover { background: var(--bg-card-hover); border-color: var(--border-color); transform: translateX(-4px); }
        .coin-left { display: flex; align-items: center; gap: 12px; flex: 1; }
        .coin-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;}
        .btc-icon { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .eth-icon { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .coin-name-block { display: flex; flex-direction: column; }
        .coin-symbol { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        .coin-chart { flex: 1; display: flex; justify-content: center; padding: 0 10px; }
        .coin-chart svg { width: 60px; height: 25px; }
        .coin-right { text-align: left; display: flex; flex-direction: column; align-items: flex-end; flex: 1;}
        .coin-price { font-size: 15px; font-weight: 700; }
        .coin-change { font-size: 13px; font-weight: 500; }
        .up { color: var(--success); }
        .down { color: var(--danger); }

        /* ================= البانر الإعلاني (السلايدر) ================= */
        .promo-banner { background: linear-gradient(90deg, #1e3a8a, #4c1d95); border-radius: 20px; padding: 20px; margin: 0 20px 24px; display: flex; align-items: center; justify-content: space-between; position: relative; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); min-height: 120px; }
        .promo-content { z-index: 1; flex: 1; }
        .promo-title { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
        .promo-desc { font-size: 11px; color: rgba(255,255,255,0.7); margin-bottom: 14px; max-width: 90%; line-height: 1.5; }
        .promo-btn { background: rgba(255, 255, 255, 0.2); color: white; border: 1px solid rgba(255,255,255,0.4); padding: 8px 18px; border-radius: 8px; font-weight: 600; font-size: 12px; transition: all 0.3s; display: inline-block; backdrop-filter: blur(5px); }
        .promo-image { width: 70px; z-index: 1; animation: float 3s ease-in-out infinite; text-align: left; }
        
        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0); } }

        /* ================= شبكة الأخبار والرابحين ================= */
        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 400px) { .bottom-grid { grid-template-columns: 1fr; } }

        .news-item { display: flex; gap: 12px; margin-bottom: 15px; cursor: pointer; transition: opacity 0.3s;}
        .news-img { width: 70px; height: 50px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .news-img img { width: 100%; height: 100%; object-fit: cover; }
        .news-content { display: flex; flex-direction: column; justify-content: center;}
        .news-title { font-size: 12px; font-weight: 700; margin-bottom: 4px; line-height: 1.3;}
        .news-time { font-size: 10px; color: var(--text-muted); }
        /* ========================================= */
/* 🔥 توافقية التصميم مع شاشات الموبايل (تصغير العناصر) 🔥 */
/* ========================================= */
@media (max-width: 768px) {
    /* تقليل المسافات الجانبية للصفحة */
    .section-container { padding: 0 15px; }
    
    /* تصغير بطاقة الرصيد وحل مشكلة الأرقام الطويلة */
    .balance-card { padding: 16px; }
    .balance-amount { 
        font-size: 22px; /* تصغير خط الرصيد */
        word-break: break-all; /* إجبار الرقم الطويل على النزول لسطر جديد */
        line-height: 1.3;
    }
    .balance-header, .balance-change { font-size: 12px; margin-bottom: 12px; }

    /* تصغير أزرار الإجراءات (تحويل، سحب، تعبئة) لتستوعب النص الطويل */
    .action-buttons { gap: 8px; }
    .action-btn { 
        padding: 8px 4px; 
        font-size: 11px; 
        text-align: center;
        line-height: 1.4;
    }
    .action-btn .icon-box { width: 28px; height: 28px; }

    /* تصغير أيقونات ونصوص الاختصارات السريعة */
    .shortcut-icon { width: 42px; height: 42px; }
    .shortcut-text { font-size: 11px; }
    .quick-shortcuts { padding: 0 15px 10px; }
    .quick-shortcuts-title { padding: 0 15px; }

    /* تصغير بطاقة الـ VIP */
    .vip-card { padding: 12px; }
    .vip-icon { width: 36px; height: 36px; }
    .vip-level { font-size: 14px; }
    .progress-bar-bg { width: 90px; }

    /* تصغير البانر الإعلاني */
    .promo-banner { padding: 15px; margin: 0 15px 20px; min-height: 100px; }
    .promo-title { font-size: 14px; }
    .promo-desc { font-size: 10px; max-width: 100%; }
    .promo-image { width: 60px; }

    /* تصغير الهيدر العلوي */
    header { padding: 15px; }
    .logo-area { font-size: 18px; }
}

    </style>
</head>

<script>

    // 1. إخفاء وإظهار الرصيد
    const toggleBtn = document.getElementById('toggleBalance');
    const amountSpan = document.getElementById('amountValue');
    let isHidden = false;
    window.currentBalance = '0.00'; 

    toggleBtn.addEventListener('click', () => {
        isHidden = !isHidden;
        if(isHidden) {
            amountSpan.innerText = '***,***.**';
            toggleBtn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22"></path></svg>`;
        } else {
            amountSpan.innerText = window.currentBalance;
            toggleBtn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
        }
    });

    // 2. سلايدر البانر الإعلاني (يتبدل كل 5 ثواني) مع الصور الشفافة ثلاثية الأبعاد
    const promos = [
        { title: "دع أموالك تنمو مع Rivana", desc: "استثمر أموالك واحصل على عائد يومي مضمون عبر التخزين.", img: "https://cdn-icons-png.flaticon.com/512/7653/7653244.png", link: "invest.html" },
        { title: "باقات VIP الحصرية", desc: "ارتقِ بعضويتك واحصل على أرباح مضاعفة ومدير حساب.", img: "https://cdn-icons-png.flaticon.com/512/6941/6941697.png", link: "packages.html" },
        { title: "مكافأة دعوة الأصدقاء", desc: "احصل على عمولة 10% من تداولات أصدقائك مدى الحياة.", img: "https://cdn-icons-png.flaticon.com/512/4213/4213958.png", link: "invite.html" },
        { title: "مركز الدعم السريع", desc: "فريقنا متواجد 24/7 للرد على استفساراتك وحل مشاكلك.", img: "https://cdn-icons-png.flaticon.com/512/4233/4233830.png", link: "support.html" }
    ];
    
    let currentPromo = 0;
    function rotatePromos() {
        const promoDiv = document.getElementById('promoSlider');
        const p = promos[currentPromo];
        promoDiv.innerHTML = `
            <div class="promo-content fade-in">
                <div class="promo-title">${p.title}</div>
                <div class="promo-desc">${p.desc}</div>
                <a href="${p.link}" class="promo-btn">اكتشف المزيد</a>
            </div>
            <div class="promo-image fade-in">
                <img src="${p.img}" style="width: 100%; height: auto; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));" alt="promo icon">
            </div>
        `;
        currentPromo = (currentPromo + 1) % promos.length;
    }
    rotatePromos();
    setInterval(rotatePromos, 5000); // 5 ثواني

    // 3. سلايدر أعلى الرابحين (عملات وهمية تتبدل كل 4 ثواني)
    const fakeGainers = [
        { sym: "PEPE", price: "$0.0014", change: "+18.5%", icon: "P", color: "#10b981", bg: "rgba(16, 185, 129, 0.15)" },
        { sym: "WIF", price: "$2.45", change: "+12.4%", icon: "W", color: "#ec4899", bg: "rgba(236, 72, 153, 0.15)" },
        { sym: "ONDO", price: "$1.05", change: "+9.8%", icon: "O", color: "#8b5cf6", bg: "rgba(139, 92, 246, 0.15)" },
        { sym: "FLOKI", price: "$0.0002", change: "+25.1%", icon: "F", color: "#f59e0b", bg: "rgba(245, 158, 11, 0.15)" },
        { sym: "BONK", price: "$0.00003", change: "+14.2%", icon: "B", color: "#f97316", bg: "rgba(249, 115, 22, 0.15)" },
        { sym: "SHIB", price: "$0.000028", change: "+11.7%", icon: "S", color: "#ef4444", bg: "rgba(239, 68, 68, 0.15)" },
        { sym: "DOGE", price: "$0.18", change: "+8.5%", icon: "D", color: "#eab308", bg: "rgba(234, 179, 8, 0.15)" }
    ];
    let gainerIndex = 0;
    function rotateGainers() {
        const list = document.getElementById('gainersList');
        list.innerHTML = "";
        for(let i=0; i<3; i++) { 
            let coin = fakeGainers[(gainerIndex + i) % fakeGainers.length];
            list.innerHTML += `
                <a href="#" class="coin-item slide-up" style="padding: 10px; animation-delay: ${i*0.1}s">
                    <div class="coin-left" style="gap: 8px;">
                        <div class="coin-icon" style="width: 28px; height: 28px; font-size: 11px; background:${coin.bg}; color:${coin.color}">${coin.icon}</div>
                        <div class="coin-symbol" style="font-size: 12px;">${coin.sym}</div>
                    </div>
                    <div class="coin-right">
                        <div class="coin-price" style="font-size: 12px;">${coin.price}</div>
                        <div class="coin-change up" style="font-size: 11px;">${coin.change}</div>
                    </div>
                </a>
            `;
        }
        gainerIndex = (gainerIndex + 3) % fakeGainers.length;
    }
    rotateGainers();
    setInterval(rotateGainers, 4000); // 4 ثواني

    // 4. سلايدر أخبار السوق (أخبار وهمية تتبدل كل 6 ثواني)
    const fakeNews = [
        { title: "بيتكوين تتجاوز 65,000 دولار مع زيادة الطلب المؤسسي", time: "منذ 1 ساعة", img: "https://images.unsplash.com/photo-1518546305927-5a555bb7020d?auto=format&fit=crop&w=150&q=80" },
        { title: "تحديثات إيثريوم قادمة لتقليل رسوم التحويل بشكل كبير", time: "منذ 3 ساعات", img: "https://images.unsplash.com/photo-1622630998477-20aa696ecb05?auto=format&fit=crop&w=150&q=80" },
        { title: "إطلاق مشاريع الذكاء الاصطناعي على شبكات البلوكتشين", time: "منذ 5 ساعات", img: "https://images.unsplash.com/photo-1605792657660-596af9009e82?auto=format&fit=crop&w=150&q=80" },
        { title: "محللون يتوقعون موجة صعود جديدة في العملات البديلة", time: "منذ 8 ساعات", img: "https://images.unsplash.com/photo-1621416894569-0f39ed31d247?auto=format&fit=crop&w=150&q=80" }
    ];
    let newsIndex = 0;
    function rotateNews() {
        const list = document.getElementById('newsSlider');
        list.innerHTML = "";
        for(let i=0; i<2; i++) { 
            let news = fakeNews[(newsIndex + i) % fakeNews.length];
            list.innerHTML += `
                <a href="#" class="news-item slide-up" style="margin-top: ${i===1? '10px' : '0'}; animation-delay: ${i*0.1}s">
                    <div class="news-img">
                        <img src="${news.img}" alt="News">
                    </div>
                    <div class="news-content">
                        <div class="news-title">${news.title}</div>
                        <div class="news-time">${news.time}</div>
                    </div>
                </a>
            `;
        }
        newsIndex = (newsIndex + 2) % fakeNews.length;
    }
    rotateNews();
    setInterval(rotateNews, 6000); // 6 ثواني
</script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // إعدادات فايربيس الخاصة بك
    const firebaseConfig = {
      apiKey: "AIzaSyCWOr0McRsxLMHehiBA_EIpabnz5CBxp04",
      authDomain: "reivana-8e377.firebaseapp.com",
      projectId: "reivana-8e377",
      storageBucket: "reivana-8e377.firebasestorage.app",
      messagingSenderId: "1066129522960",
      appId: "1:1066129522960:web:8179e50a906fd08ee96595",
      measurementId: "G-TD9YWWDEDT"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 🔔 دالة محسّنة لمراقبة الإشعارات غير المقروءة من المجموعة العامة
    function listenToUnreadNotifications(userId) {
        const badge = document.getElementById('unread-count');
        
        // جلب الإشعارات غير المقروءة الخاصة بالمستخدم من مجموعة notifications العامة
        const notificationsRef = collection(db, "notifications");
        const q = query(
            notificationsRef,
            where("userId", "==", userId),
            where("isRead", "==", false)
        );

        onSnapshot(q, (snapshot) => {
            const unreadCount = snapshot.size; 
            
            if (unreadCount > 0) {
                badge.innerText = unreadCount;
                badge.style.display = 'flex'; 
            } else {
                badge.style.display = 'none'; 
            }
        });
    }

    // 👤 مراقبة حالة تسجيل دخول المستخدم وجلب بياناته
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // تشغيل مراقب الإشعارات العام اللحظي
            listenToUnreadNotifications(user.uid);
            
            try {
                // جلب مستند المستخدم الحقيقي
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    const userData = userSnap.data();
                    
                    // 1. تحديث الرصيد الحقيقي
                    if(userData.balance !== undefined) {
                        const formattedBalance = Number(userData.balance).toLocaleString('en-US', {
                            minimumFractionDigits: 2,
                            maximumFractionDigits: 2
                        });
                        window.currentBalance = formattedBalance;
                        
                        const amountSpan = document.getElementById('amountValue');
                        if(amountSpan.innerText !== '***,***.**') {
                            amountSpan.innerText = formattedBalance;
                        }
                    }

                    // 2. تحديث بيانات الـ VIP ديناميكياً
                    const vipLevelEl = document.getElementById('userVipLevel');
                    const vipProgressEl = document.getElementById('userVipProgress');

                    // تحديث رقم المستوى (يفترض وجود حقل vipLevel في المستند، مثل: 1 أو 2)
                    if(userData.vipLevel !== undefined) {
                        vipLevelEl.innerText = `VIP ${userData.vipLevel}`;
                    } else {
                        vipLevelEl.innerText = `VIP 0`; // القيمة الافتراضية
                    }

                    // تحديث شريط التقدم (يفترض وجود حقل vipProgress بقيمة من 0 إلى 100)
                    if(userData.vipProgress !== undefined) {
                        vipProgressEl.style.width = `${userData.vipProgress}%`;
                    } else {
                        vipProgressEl.style.width = `0%`; // القيمة الافتراضية
                    }

                    // 3. تحديث الصورة الشخصية الحقيقية أو توليد صورة باسمه
                    const avatarImg = document.getElementById('userAvatar');
                    if(userData.photoURL) {
                        avatarImg.src = userData.photoURL; 
                    } else {
                        const userName = userData.name || 'مستخدم';
                        avatarImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(userName)}&background=7c3aed&color=fff&bold=true`;
                    }
                }
            } catch (error) {
                console.error("حدث خطأ أثناء جلب البيانات:", error);
            }
            
        } else {
            // 🔴 التعديل هنا: طرد المستخدم غير المسجل وتوجيهه لصفحة تسجيل الدخول
            window.location.replace("login.html");
        }
    });
    document.addEventListener("DOMContentLoaded", function() {
        // استخراج اسم الصفحة الحالية من الرابط
        let currentPath = window.location.pathname.split('/').pop();
        
        // إذا كان الرابط فارغاً، اعتبره الصفحة الرئيسية
        if (currentPath === '' || currentPath === '/') {
            currentPath = 'home.html';
        }

        const navItems = document.querySelectorAll('.bottom-nav .nav-item');
        
        navItems.forEach(item => {
            // أخذ الرابط الموجود في زر التنقل
            const itemHref = item.getAttribute('href');
            
            // مطابقة الرابط مع الصفحة وتفعيل الكلاس المناسب
            if (currentPath === itemHref) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    });
</script>
